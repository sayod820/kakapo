<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Шаблон чека — KAKAPO</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; font-family: system-ui, -apple-system, 'Segoe UI', sans-serif; background: #0d1117; color: #e6edf3; }
    .app { display: flex; flex-direction: column; height: 100%; }
    header { padding: 12px 20px; border-bottom: 1px solid #30363d; display: flex; align-items: center; justify-content: space-between; }
    header h1 { font-size: 16px; font-weight: 600; }
    .toolbar { display: flex; gap: 8px; }
    button {
      padding: 7px 14px; border-radius: 6px; border: 1px solid #30363d;
      background: #21262d; color: #e6edf3; cursor: pointer; font-size: 13px;
    }
    button:hover { background: #30363d; }
    button.primary { background: #238636; border-color: #2ea043; }
    button.primary:hover { background: #2ea043; }
    button.danger { background: #6e2a2a; border-color: #8b3333; }
    .main { display: flex; flex: 1; overflow: hidden; }
    .form-panel { width: 420px; min-width: 360px; overflow-y: auto; border-right: 1px solid #30363d; padding: 12px 16px; }
    .preview-panel { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 20px; background: #161b22; overflow: auto; }
    .section { margin-bottom: 16px; }
    .section h2 { font-size: 12px; text-transform: uppercase; letter-spacing: 0.05em; color: #8b949e; margin-bottom: 8px; }
    label { display: block; font-size: 12px; color: #8b949e; margin-bottom: 3px; }
    input[type="text"] {
      width: 100%; padding: 6px 8px; margin-bottom: 8px;
      background: #0d1117; border: 1px solid #30363d; border-radius: 4px; color: #e6edf3; font-size: 13px;
    }
    input[type="text"]:focus { outline: none; border-color: #58a6ff; }
    .checkbox-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4px 12px; }
    .checkbox-grid label { display: flex; align-items: center; gap: 6px; font-size: 12px; color: #c9d1d9; margin: 0; cursor: pointer; }
    .checkbox-grid input { accent-color: #238636; }
    .status { font-size: 12px; color: #8b949e; padding: 0 20px 8px; }
    .status.ok { color: #3fb950; }
    .status.err { color: #f85149; }
    .preview-wrap { background: #fff; padding: 16px; border-radius: 4px; box-shadow: 0 4px 24px rgba(0,0,0,0.4); }
    .preview-label { font-size: 11px; color: #8b949e; margin-bottom: 12px; text-align: center; }
    iframe { border: none; width: 272px; height: 720px; background: #fff; }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <h1>Шаблон чека 58 мм</h1>
      <div class="toolbar">
        <button type="button" id="btnSave" class="primary">Сохранить</button>
        <button type="button" id="btnTest">Тест печати</button>
        <button type="button" id="btnReset" class="danger">Сброс</button>
        <button type="button" id="btnClose">Закрыть</button>
      </div>
    </header>
    <p class="status" id="status"></p>
    <div class="main">
      <div class="form-panel" id="formPanel"></div>
      <div class="preview-panel">
        <p class="preview-label">Предпросмотр (демо ORD-1047)</p>
        <div class="preview-wrap">
          <iframe id="preview" title="Предпросмотр чека"></iframe>
        </div>
      </div>
    </div>
  </div>
  <script>
    const api = window.kakapoDesktop
    const TEXT_FIELDS = [
      { key: 'storeName', section: 'header', label: 'Название магазина' },
      { key: 'subtitle', section: 'header', label: 'Подзаголовок' },
      { key: 'storePhone', section: 'header', label: 'Телефон' },
      { key: 'docTitle', section: 'header', label: 'Заголовок чека' },
      { key: 'docTitleReturn', section: 'header', label: 'Заголовок возврата' },
      { key: 'docTitlePartial', section: 'header', label: 'Заголовок частичного возврата' },
      { key: 'currency', section: 'header', label: 'Валюта' },
      { key: 'labelOrderNo', section: 'labels', label: 'Номер заказа' },
      { key: 'labelReceiptNo', section: 'labels', label: 'Номер чека' },
      { key: 'labelDate', section: 'labels', label: 'Дата' },
      { key: 'labelPos', section: 'labels', label: 'Касса' },
      { key: 'labelCashier', section: 'labels', label: 'Кассир' },
      { key: 'labelClient', section: 'labels', label: 'Клиент' },
      { key: 'labelClientPhone', section: 'labels', label: 'Тел. клиента' },
      { key: 'labelSum', section: 'labels', label: 'Сумма' },
      { key: 'labelDiscount', section: 'labels', label: 'Скидка' },
      { key: 'labelBonusEarned', section: 'labels', label: 'Начислено бонусов' },
      { key: 'labelBonusSpent', section: 'labels', label: 'Списано бонусов' },
      { key: 'labelTotal', section: 'labels', label: 'ИТОГ' },
      { key: 'labelPay', section: 'labels', label: 'Оплата' },
      { key: 'labelCash', section: 'labels', label: 'Наличные' },
      { key: 'labelCard', section: 'labels', label: 'Картой' },
      { key: 'labelDebt', section: 'labels', label: 'В долг' },
      { key: 'labelCashGiven', section: 'labels', label: 'Дал клиент' },
      { key: 'labelChange', section: 'labels', label: 'Сдача' },
      { key: 'labelBonusBalance', section: 'labels', label: 'Баланс бонусов' },
      { key: 'footerThanks', section: 'footer', label: 'Благодарность' },
      { key: 'footerNote', section: 'footer', label: 'Примечание' },
    ]
    const BOOL_FIELDS = [
      { key: 'showOrderNo', label: 'Номер заказа' },
      { key: 'showReceiptNo', label: 'Номер чека' },
      { key: 'showDate', label: 'Дата' },
      { key: 'showPos', label: 'Касса' },
      { key: 'showCashier', label: 'Кассир' },
      { key: 'showClient', label: 'Клиент' },
      { key: 'showClientPhone', label: 'Тел. клиента' },
      { key: 'showDiscount', label: 'Скидка' },
      { key: 'showBonusEarned', label: 'Начислено бонусов' },
      { key: 'showBonusSpent', label: 'Списано бонусов' },
      { key: 'showBonusBalance', label: 'Баланс бонусов' },
      { key: 'showPay', label: 'Оплата' },
      { key: 'showCash', label: 'Наличные' },
      { key: 'showCard', label: 'Картой' },
      { key: 'showDebt', label: 'В долг' },
      { key: 'showCashGiven', label: 'Дал клиент' },
      { key: 'showChange', label: 'Сдача' },
    ]
    const SECTION_TITLES = { header: 'Шапка', labels: 'Подписи полей', footer: 'Футер', show: 'Отображение полей' }

    let template = {}
    let defaults = {}

    function money(n) {
      return (Math.round((Number(n) || 0) * 100) / 100).toFixed(2)
    }
    function fmt(n, cur) { return `${money(n)} ${cur || 'сом'}` }
    function padLine(left, right, w) {
      const l = String(left || ''), r = String(right || '')
      const sp = Math.max(1, w - l.length - r.length)
      return l + ' '.repeat(sp) + r
    }
    function esc(s) {
      return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    }

    const DEMO_SALE = {
      number: 128, orderId: 'ORD-1047', createdAtIso: '2026-07-18T14:32:00',
      cashierName: 'Азиза М.', clientName: 'Рустам А.', clientPhone: '+992 900 12 34 56',
      cardNum: '4821', paymentMethod: 'mixed', total: 147.5, paidCash: 50, paidCard: 97.5,
      cashReceived: 100, changeGiven: 50, orderGoodsTotal: 175, discountAmount: 17.5,
      bonusSpent: 10, bonusEarned: 15, bonusBalanceBefore: 245, bonusBalanceAfter: 250,
      items: [
        { productName: 'Шампунь Head&Shoulders 400мл', qty: 1, price: 85, lineTotal: 85 },
        { productName: 'Мыло Dove 100г', qty: 2, price: 18, lineTotal: 36 },
        { productName: 'Зубная паста Colgate', qty: 1, price: 42, lineTotal: 42 },
        { productName: 'Хлеб белый', qty: 2, price: 6, lineTotal: 12 },
      ],
    }

    function buildPreviewHtml(tpl) {
      const cur = tpl.currency || 'сом'
      const w = 32
      const when = '18.07.2026 14:32'
      const subtotal = 175
      const discount = 17.5
      const discountPct = 10
      const total = 147.5
      const lines = []
      const sep = () => lines.push('<div class="sep"></div>')
      const kv = (l, v) => { if (v) lines.push(`<div class="kv"><span>${esc(l)}</span><span>${esc(v)}</span></div>`) }
      const center = (t, bold) => lines.push(`<div class="c${bold ? ' bold' : ''}">${esc(t)}</div>`)

      center(tpl.storeName, true)
      center(tpl.subtitle)
      if (tpl.storePhone) center(tpl.storePhone)
      sep()
      center(tpl.docTitle, true)
      sep()
      if (tpl.showOrderNo) kv(tpl.labelOrderNo, 'ORD-1047')
      if (tpl.showReceiptNo) kv(tpl.labelReceiptNo, '№128')
      if (tpl.showDate) kv(tpl.labelDate, when)
      if (tpl.showPos) kv(tpl.labelPos, 'Касса 1')
      if (tpl.showCashier) kv(tpl.labelCashier, 'Азиза М.')
      if (tpl.showClient) kv(tpl.labelClient, 'Рустам А.')
      if (tpl.showClientPhone) kv(tpl.labelClientPhone, '+992 900 12 34 56')
      sep()
      lines.push(`<div class="kv"><span>Шампунь Head&Shoulders</span><span>${fmt(85, cur)}</span></div>`)
      lines.push('<div class="detail">400мл</div>')
      lines.push('<div class="qty">1 x 85.00</div>')
      lines.push(`<div class="kv"><span>Мыло Dove 100г</span><span>${fmt(36, cur)}</span></div>`)
      lines.push('<div class="qty">2 x 18.00</div>')
      lines.push(`<div class="kv"><span>Зубная паста Colgate</span><span>${fmt(42, cur)}</span></div>`)
      lines.push('<div class="qty">1 x 42.00</div>')
      lines.push(`<div class="kv"><span>Хлеб белый</span><span>${fmt(12, cur)}</span></div>`)
      lines.push('<div class="qty">2 x 6.00</div>')
      sep()
      kv(tpl.labelSum, fmt(subtotal, cur))
      if (tpl.showDiscount) kv(`${tpl.labelDiscount} ${discountPct}%`, `-${fmt(discount, cur)}`)
      if (tpl.showBonusEarned) kv(tpl.labelBonusEarned, '+15')
      if (tpl.showBonusSpent) kv(tpl.labelBonusSpent, `-${fmt(10, cur)}`)
      lines.push(`<div class="kv bold big"><span>${esc(tpl.labelTotal)}</span><span>${fmt(total, cur)}</span></div>`)
      sep()
      if (tpl.showPay) kv(tpl.labelPay, 'Смешанная')
      if (tpl.showCash) kv(tpl.labelCash, fmt(50, cur))
      if (tpl.showCard) kv(`${tpl.labelCard} (Visa ****4821)`, fmt(97.5, cur))
      if (tpl.showCashGiven) kv(tpl.labelCashGiven, fmt(100, cur))
      if (tpl.showChange) lines.push(`<div class="kv bold"><span>${esc(tpl.labelChange)}</span><span>${fmt(50, cur)}</span></div>`)
      if (tpl.showBonusBalance) {
        sep()
        kv(tpl.labelBonusBalance, '245 -> 250')
      }
      sep()
      center(tpl.footerThanks, true)
      center(tpl.footerNote)

      return `<!DOCTYPE html><html><head><meta charset="UTF-8"><style>
        body { margin: 0; padding: 8px 6px; font-family: 'Courier New', Courier, monospace; font-size: 11px; line-height: 1.35; color: #000; width: ${w}ch; }
        .c { text-align: center; }
        .bold { font-weight: bold; }
        .big { font-size: 13px; }
        .sep { border-top: 1px dashed #000; margin: 6px 0; }
        .kv { display: flex; justify-content: space-between; gap: 4px; }
        .kv span:last-child { text-align: right; white-space: nowrap; }
        .detail, .qty { font-size: 10px; }
        .qty { margin-bottom: 2px; }
      </style></head><body>${lines.join('')}</body></html>`
    }

    function readForm() {
      const out = { ...template }
      for (const f of TEXT_FIELDS) {
        const el = document.getElementById('f_' + f.key)
        if (el) out[f.key] = el.value
      }
      for (const f of BOOL_FIELDS) {
        const el = document.getElementById('f_' + f.key)
        if (el) out[f.key] = el.checked
      }
      return out
    }

    function updatePreview() {
      const tpl = readForm()
      const iframe = document.getElementById('preview')
      iframe.srcdoc = buildPreviewHtml(tpl)
    }

    function buildForm() {
      const panel = document.getElementById('formPanel')
      const sections = { header: [], labels: [], footer: [], show: [] }
      for (const f of TEXT_FIELDS) sections[f.section].push(f)
      for (const sec of ['header', 'labels', 'footer', 'show']) {
        const div = document.createElement('div')
        div.className = 'section'
        div.innerHTML = `<h2>${SECTION_TITLES[sec]}</h2>`
        if (sec === 'show') {
          const grid = document.createElement('div')
          grid.className = 'checkbox-grid'
          for (const f of BOOL_FIELDS) {
            const lbl = document.createElement('label')
            lbl.innerHTML = `<input type="checkbox" id="f_${f.key}" checked> ${esc(f.label)}`
            grid.appendChild(lbl)
          }
          div.appendChild(grid)
        } else {
          for (const f of sections[sec]) {
            const wrap = document.createElement('div')
            wrap.innerHTML = `<label for="f_${f.key}">${esc(f.label)}</label>
              <input type="text" id="f_${f.key}" data-key="${f.key}">`
            div.appendChild(wrap)
          }
        }
        panel.appendChild(div)
      }
      panel.querySelectorAll('input').forEach(el => {
        el.addEventListener('input', updatePreview)
        el.addEventListener('change', updatePreview)
      })
    }

    function fillForm(tpl) {
      template = { ...tpl }
      for (const f of TEXT_FIELDS) {
        const el = document.getElementById('f_' + f.key)
        if (el) el.value = tpl[f.key] != null ? tpl[f.key] : ''
      }
      for (const f of BOOL_FIELDS) {
        const el = document.getElementById('f_' + f.key)
        if (el) el.checked = tpl[f.key] !== false
      }
      updatePreview()
    }

    function setStatus(msg, ok) {
      const el = document.getElementById('status')
      el.textContent = msg || ''
      el.className = 'status' + (msg ? (ok ? ' ok' : ' err') : '')
    }

    async function init() {
      buildForm()
      try {
        const data = await api.getReceiptTemplate()
        defaults = data.defaults || {}
        fillForm(data.template || data)
      } catch (err) {
        setStatus('Ошибка загрузки: ' + (err.message || err), false)
      }
    }

    document.getElementById('btnSave').addEventListener('click', async () => {
      try {
        const tpl = readForm()
        await api.saveReceiptTemplate(tpl)
        template = tpl
        setStatus('Сохранено', true)
      } catch (err) {
        setStatus('Ошибка сохранения: ' + (err.message || err), false)
      }
    })

    document.getElementById('btnTest').addEventListener('click', async () => {
      try {
        setStatus('Печать…', true)
        const tpl = readForm()
        await api.printReceipt({ sale: DEMO_SALE, ...tpl, posLabel: 'Касса 1' })
        setStatus('Тестовый чек отправлен на печать', true)
      } catch (err) {
        setStatus('Ошибка печати: ' + (err.message || err), false)
      }
    })

    document.getElementById('btnReset').addEventListener('click', () => {
      if (defaults && Object.keys(defaults).length) fillForm(defaults)
      setStatus('Сброшено к значениям по умолчанию', true)
    })

    document.getElementById('btnClose').addEventListener('click', () => {
      api.closeReceiptEditor()
    })

    init()
  </script>
</body>
</html>
