<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Шаблон чека — KAKAPO</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; font-family: system-ui, -apple-system, 'Segoe UI', sans-serif; background: #0d1117; color: #e6edf3; }
    .app { display: flex; flex-direction: column; height: 100%; }
    header { padding: 12px 20px; border-bottom: 1px solid #30363d; display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
    header h1 { font-size: 16px; font-weight: 600; }
    .header-left { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
    .tabs { display: inline-flex; padding: 3px; border-radius: 8px; background: #161b22; border: 1px solid #30363d; gap: 2px; }
    .tab { padding: 6px 12px; border-radius: 6px; border: 0; background: transparent; color: #8b949e; cursor: pointer; font-size: 12px; font-weight: 600; }
    .tab.active { background: #238636; color: #fff; }
    .toolbar { display: flex; gap: 8px; flex-wrap: wrap; }
    button { padding: 7px 14px; border-radius: 6px; border: 1px solid #30363d; background: #21262d; color: #e6edf3; cursor: pointer; font-size: 13px; }
    button:hover { background: #30363d; }
    button.primary { background: #238636; border-color: #2ea043; }
    button.primary:hover { background: #2ea043; }
    button.danger { background: #6e2a2a; border-color: #8b3333; }
    .main { display: flex; flex: 1; overflow: hidden; }
    .form-panel { width: 440px; min-width: 360px; overflow-y: auto; border-right: 1px solid #30363d; padding: 12px 16px; }
    .preview-panel { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 20px; background: #161b22; overflow: auto; }
    .section { margin-bottom: 16px; }
    .section h2 { font-size: 12px; text-transform: uppercase; letter-spacing: 0.05em; color: #8b949e; margin-bottom: 8px; }
    label { display: block; font-size: 12px; color: #8b949e; margin-bottom: 3px; }
    input[type="text"], input[type="number"], select {
      width: 100%; padding: 6px 8px; margin-bottom: 8px;
      background: #0d1117; border: 1px solid #30363d; border-radius: 4px; color: #e6edf3; font-size: 13px;
    }
    input:focus, select:focus { outline: none; border-color: #58a6ff; }
    .style-row { display: grid; grid-template-columns: 1fr 110px 72px; gap: 8px; align-items: end; margin-bottom: 8px; }
    .style-row .chk { display: flex; align-items: center; gap: 6px; color: #c9d1d9; font-size: 12px; margin-bottom: 8px; }
    .checkbox-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4px 12px; }
    .checkbox-grid label { display: flex; align-items: center; gap: 6px; font-size: 12px; color: #c9d1d9; margin: 0; cursor: pointer; }
    .checkbox-grid input, .style-row input { accent-color: #238636; }
    .status { font-size: 12px; color: #8b949e; padding: 0 20px 8px; }
    .status.ok { color: #3fb950; }
    .status.err { color: #f85149; }
    .preview-wrap { background: #fff; padding: 12px; border-radius: 4px; box-shadow: 0 4px 24px rgba(0,0,0,0.4); }
    .preview-label { font-size: 11px; color: #8b949e; margin-bottom: 12px; text-align: center; }
    iframe { border: none; background: #fff; }
    #codePanel { display: none; }
    #codePanel.active { display: block; }
    #formPanel.hidden { display: none; }
    #codeEditor {
      width: 100%; min-height: calc(100vh - 140px); resize: vertical;
      font-family: 'Cascadia Code', 'Fira Code', Consolas, monospace;
      font-size: 12.5px; line-height: 1.5; tab-size: 2;
      padding: 12px; border-radius: 6px; border: 1px solid #30363d;
      background: #0d1117; color: #e6edf3; white-space: pre; overflow: auto;
    }
    .code-hint { font-size: 12px; color: #8b949e; margin-bottom: 8px; }
    .hint { font-size: 11px; color: #8b949e; margin-bottom: 10px; line-height: 1.4; }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div class="header-left">
        <h1>Шаблон чека 58 мм</h1>
        <div class="tabs">
          <button type="button" class="tab active" id="tabForm">Форма</button>
          <button type="button" class="tab" id="tabCode">&#123; &#125; Код</button>
        </div>
      </div>
      <div class="toolbar">
        <button type="button" id="btnSave" class="primary">Сохранить</button>
        <button type="button" id="btnTest">Тест печати</button>
        <button type="button" id="btnReset" class="danger">Сброс</button>
        <button type="button" id="btnClose">Закрыть</button>
      </div>
    </header>
    <p class="status" id="status"></p>
    <div class="main">
      <div class="form-panel">
        <div id="formPanel"></div>
        <div id="codePanel">
          <p class="code-hint">JSON шаблона. Превью = то, что уйдёт на бумагу.</p>
          <textarea id="codeEditor" spellcheck="false"></textarea>
        </div>
      </div>
      <div class="preview-panel">
        <p class="preview-label">Превью = печать XP-58C · 58 мм</p>
        <div class="preview-wrap">
          <iframe id="preview" title="Предпросмотр чека"></iframe>
        </div>
      </div>
    </div>
  </div>
  <script>
    const api = window.kakapoDesktop
    const SIZE_OPTS = [
      ['small', 'Мелкий'],
      ['normal', 'Обычный'],
      ['tall', 'Высокий'],
    ]
    const STYLE_BLOCKS = [
      { sizeKey: 'sizeStoreName', boldKey: 'boldStoreName', label: 'Название магазина' },
      { sizeKey: 'sizeSubtitle', boldKey: 'boldSubtitle', label: 'Подзаголовок' },
      { sizeKey: 'sizePhone', boldKey: 'boldPhone', label: 'Телефон' },
      { sizeKey: 'sizeDocTitle', boldKey: 'boldDocTitle', label: 'Заголовок чека' },
      { sizeKey: 'sizeBody', boldKey: 'boldBody', label: 'Строки мета / итоги' },
      { sizeKey: 'sizeItems', boldKey: 'boldItems', label: 'Товары' },
      { sizeKey: 'sizeTotal', boldKey: 'boldTotal', label: 'ИТОГ' },
      { sizeKey: 'sizeFooter', boldKey: 'boldFooterThanks', label: 'Футер «спасибо»', bold2Key: 'boldFooterNote', bold2Label: 'примечание' },
      { boldOnly: true, boldKey: 'boldChange', label: 'Сдача — жирный' },
    ]
    const TEXT_FIELDS = [
      { key: 'storeName', section: 'header', label: 'Название магазина' },
      { key: 'subtitle', section: 'header', label: 'Подзаголовок' },
      { key: 'storePhone', section: 'header', label: 'Телефон' },
      { key: 'docTitle', section: 'header', label: 'Заголовок чека' },
      { key: 'docTitleReturn', section: 'header', label: 'Заголовок возврата' },
      { key: 'docTitlePartial', section: 'header', label: 'Заголовок частичного возврата' },
      { key: 'currency', section: 'header', label: 'Валюта' },
      { key: 'labelOrderNo', section: 'labels', label: 'Номер заказа' },
      { key: 'labelReceiptNo', section: 'labels', label: 'Номер чека' },
      { key: 'labelDate', section: 'labels', label: 'Дата' },
      { key: 'labelPos', section: 'labels', label: 'Касса' },
      { key: 'labelCashier', section: 'labels', label: 'Кассир' },
      { key: 'labelClient', section: 'labels', label: 'Клиент' },
      { key: 'labelClientPhone', section: 'labels', label: 'Тел. клиента' },
      { key: 'labelSum', section: 'labels', label: 'Сумма' },
      { key: 'labelDiscount', section: 'labels', label: 'Скидка' },
      { key: 'labelBonusEarned', section: 'labels', label: 'Начислено бонусов' },
      { key: 'labelBonusSpent', section: 'labels', label: 'Списано бонусов' },
      { key: 'labelTotal', section: 'labels', label: 'ИТОГ' },
      { key: 'labelPay', section: 'labels', label: 'Оплата' },
      { key: 'labelCash', section: 'labels', label: 'Наличные' },
      { key: 'labelCard', section: 'labels', label: 'Картой' },
      { key: 'labelDebt', section: 'labels', label: 'В долг' },
      { key: 'labelCashGiven', section: 'labels', label: 'Дал клиент' },
      { key: 'labelChange', section: 'labels', label: 'Сдача' },
      { key: 'labelBonusBalance', section: 'labels', label: 'Баланс бонусов' },
      { key: 'footerThanks', section: 'footer', label: 'Благодарность' },
      { key: 'footerNote', section: 'footer', label: 'Примечание' },
    ]
    const BOOL_FIELDS = [
      { key: 'showStoreName', label: 'Название магазина' },
      { key: 'showSubtitle', label: 'Подзаголовок' },
      { key: 'showStorePhone', label: 'Телефон магазина' },
      { key: 'showDocTitle', label: 'Заголовок чека' },
      { key: 'showItems', label: 'Список товаров' },
      { key: 'showSubtotal', label: 'Сумма до скидки' },
      { key: 'showFooterThanks', label: 'Благодарность' },
      { key: 'showFooterNote', label: 'Примечание внизу' },
      { key: 'showOrderNo', label: 'Номер заказа' },
      { key: 'showReceiptNo', label: 'Номер чека' },
      { key: 'showDate', label: 'Дата' },
      { key: 'showPos', label: 'Касса' },
      { key: 'showCashier', label: 'Кассир' },
      { key: 'showClient', label: 'Клиент' },
      { key: 'showClientPhone', label: 'Тел. клиента' },
      { key: 'showDiscount', label: 'Скидка' },
      { key: 'showBonusEarned', label: 'Начислено бонусов' },
      { key: 'showBonusSpent', label: 'Списано бонусов' },
      { key: 'showBonusBalance', label: 'Баланс бонусов' },
      { key: 'showPay', label: 'Оплата' },
      { key: 'showCash', label: 'Наличные' },
      { key: 'showCard', label: 'Картой' },
      { key: 'showDebt', label: 'В долг' },
      { key: 'showCashGiven', label: 'Дал клиент' },
      { key: 'showChange', label: 'Сдача' },
    ]
    const SECTION_TITLES = {
      print: 'Базовый шрифт',
      style: 'Размер и жирность',
      header: 'Шапка',
      labels: 'Подписи полей',
      footer: 'Футер',
      show: 'Отключение строк',
    }

    let template = {}
    let defaults = {}
    let mode = 'form'
    let codeErr = ''

    function money(n) { return (Math.round((Number(n) || 0) * 100) / 100).toFixed(2) }
    function fmt(n, cur) { return `${money(n)} ${cur || 'сом'}` }
    function esc(s) {
      return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    }
    function padLine(left, right, w) {
      const l = String(left || ''), r = String(right || '')
      const sp = Math.max(1, w - l.length - r.length)
      return l + ' '.repeat(sp) + r
    }
    function wrapName(name, width) {
      const s = String(name || '').trim() || 'Товар'
      if (s.length <= width) return [s]
      const lines = []
      let rest = s
      while (rest.length > width) {
        let cut = -1
        for (let i = Math.min(width, rest.length - 1); i >= Math.min(8, width); i--) {
          const ch = rest[i]
          if (ch === ' ' || ch === '-' || ch === '&') { cut = ch === ' ' ? i : i + 1; break }
        }
        if (cut < 1) cut = width
        lines.push(rest.slice(0, cut).trim())
        rest = rest.slice(cut).trim()
      }
      if (rest) lines.push(rest)
      return lines
    }
    function nameAmountLines(name, amount, width, currency) {
      const right = fmt(amount, currency)
      const maxLeft = Math.max(8, width - right.length - 1)
      const nameLines = wrapName(name, width)
      if (nameLines.length === 1 && nameLines[0].length <= maxLeft) return [padLine(nameLines[0], right, width)]
      return [...nameLines, padLine('', right, width)]
    }
    function cssClass(size, bold) {
      const sz = size === 'tall' ? 'tall' : (size === 'normal' ? 'normal' : 'small')
      return `ln ${sz}${bold ? ' bold' : ''}`
    }

    const DEMO = {
      number: 128, orderId: 'ORD-1047',
      cashierName: 'Азиза М.', clientName: 'Рустам А.', clientPhone: '+992 900 12 34 56',
      cardNum: '4821', paymentMethod: 'mixed', total: 147.5, paidCash: 50, paidCard: 97.5,
      cashReceived: 100, changeGiven: 50, orderGoodsTotal: 175, discountAmount: 17.5,
      bonusSpent: 10, bonusEarned: 15, bonusBalanceBefore: 245, bonusBalanceAfter: 250,
      items: [
        { productName: 'Шампунь Head&Shoulders 400мл', qty: 1, price: 85, lineTotal: 85 },
        { productName: 'Мыло Dove 100г', qty: 2, price: 18, lineTotal: 36 },
        { productName: 'Зубная паста Colgate', qty: 1, price: 42, lineTotal: 42 },
        { productName: 'Хлеб белый', qty: 2, price: 6, lineTotal: 12 },
      ],
    }

    /** Превью рисует те же символы/переносы, что уйдёт на принтер. */
    function buildPreviewHtml(tpl) {
      const w = tpl.printFont === 'small' ? 42 : 32
      const cur = tpl.currency || 'сом'
      const basePx = tpl.printFont === 'small' ? 10.5 : 12.5
      const out = []
      const push = (text, size, bold, center) => {
        const lines = String(text).split('\n')
        for (const line of lines) {
          out.push(`<div class="${cssClass(size, bold)}${center ? ' c' : ''}">${esc(line) || '&nbsp;'}</div>`)
        }
      }
      const sep = () => push('-'.repeat(w), tpl.sizeBody, false, false)
      const kv = (l, v, size, bold) => {
        if (!v) return
        const line = l.length + 1 + String(v).length <= w ? padLine(l, v, w) : `${l}\n${padLine('', v, w)}`
        push(line, size, bold, false)
      }

      if (tpl.showStoreName) push(tpl.storeName, tpl.sizeStoreName, tpl.boldStoreName, true)
      if (tpl.showSubtitle) push(tpl.subtitle, tpl.sizeSubtitle, tpl.boldSubtitle, true)
      if (tpl.showStorePhone && tpl.storePhone) push(tpl.storePhone, tpl.sizePhone, tpl.boldPhone, true)
      sep()
      if (tpl.showDocTitle) push(tpl.docTitle, tpl.sizeDocTitle, tpl.boldDocTitle, true)
      sep()
      if (tpl.showOrderNo) kv(tpl.labelOrderNo, 'ORD-1047', tpl.sizeBody, tpl.boldBody)
      if (tpl.showReceiptNo) kv(tpl.labelReceiptNo, '№128', tpl.sizeBody, tpl.boldBody)
      if (tpl.showDate) kv(tpl.labelDate, '18.07.2026 14:32', tpl.sizeBody, tpl.boldBody)
      if (tpl.showPos) kv(tpl.labelPos, 'Касса 1', tpl.sizeBody, tpl.boldBody)
      if (tpl.showCashier) kv(tpl.labelCashier, 'Азиза М.', tpl.sizeBody, tpl.boldBody)
      if (tpl.showClient) kv(tpl.labelClient, 'Рустам А.', tpl.sizeBody, tpl.boldBody)
      if (tpl.showClientPhone) kv(tpl.labelClientPhone, '+992 900 12 34 56', tpl.sizeBody, tpl.boldBody)
      sep()
      if (tpl.showItems) {
        for (const it of DEMO.items) {
          for (const line of nameAmountLines(it.productName, it.lineTotal, w, cur)) {
            push(line, tpl.sizeItems, tpl.boldItems, false)
          }
          push(`${it.qty} x ${money(it.price)}`, tpl.sizeItems, tpl.boldItems, false)
        }
      }
      sep()
      if (tpl.showSubtotal) kv(tpl.labelSum, fmt(175, cur), tpl.sizeBody, tpl.boldBody)
      if (tpl.showDiscount) kv(`${tpl.labelDiscount} 10%`, `-${fmt(17.5, cur)}`, tpl.sizeBody, tpl.boldBody)
      if (tpl.showBonusEarned) kv(tpl.labelBonusEarned, '+15', tpl.sizeBody, tpl.boldBody)
      if (tpl.showBonusSpent) kv(tpl.labelBonusSpent, `-${fmt(10, cur)}`, tpl.sizeBody, tpl.boldBody)
      push(padLine(tpl.labelTotal, fmt(147.5, cur), w), tpl.sizeTotal, tpl.boldTotal, false)
      sep()
      if (tpl.showPay) kv(tpl.labelPay, 'Смешанная', tpl.sizeBody, tpl.boldBody)
      if (tpl.showCash) kv(tpl.labelCash, fmt(50, cur), tpl.sizeBody, tpl.boldBody)
      if (tpl.showCard) kv(`${tpl.labelCard} (Visa ****4821)`, fmt(97.5, cur), tpl.sizeBody, tpl.boldBody)
      if (tpl.showCashGiven) kv(tpl.labelCashGiven, fmt(100, cur), tpl.sizeBody, tpl.boldBody)
      if (tpl.showChange) push(padLine(tpl.labelChange, fmt(50, cur), w), tpl.sizeBody, tpl.boldChange, false)
      if (tpl.showBonusBalance) {
        sep()
        kv(tpl.labelBonusBalance, '245 -> 250', tpl.sizeBody, tpl.boldBody)
      }
      sep()
      if (tpl.showFooterThanks) {
        for (const line of wrapName(tpl.footerThanks, w)) push(line, tpl.sizeFooter, tpl.boldFooterThanks, true)
      }
      if (tpl.showFooterNote) {
        for (const line of wrapName(tpl.footerNote, w)) push(line, tpl.sizeFooter, tpl.boldFooterNote, true)
      }

      const iframeW = Math.round(w * (basePx * 0.62) + 16)
      return `<!DOCTYPE html><html><head><meta charset="UTF-8"><style>
        body{margin:0;padding:8px 4px;background:#fff;color:#000;
          font-family:'Courier New',Courier,monospace;width:${w}ch;
          -webkit-font-smoothing:none;font-smooth:never;}
        .ln{white-space:pre;line-height:1.28;font-size:${basePx}px;font-weight:400;}
        .ln.small{font-size:${basePx}px;}
        .ln.normal{font-size:${basePx + 1.5}px;}
        .ln.tall{font-size:${basePx + 3}px;line-height:1.35;}
        .ln.bold{font-weight:700;}
        .ln.c{text-align:center;}
      </style></head><body>${out.join('')}</body></html>`
    }

    function readForm() {
      const out = { ...template }
      const fontEl = document.getElementById('f_printFont')
      const spaceEl = document.getElementById('f_lineSpacing')
      if (fontEl) out.printFont = fontEl.value
      if (spaceEl) out.lineSpacing = Number(spaceEl.value)
      for (const b of STYLE_BLOCKS) {
        if (b.sizeKey) {
          const el = document.getElementById('f_' + b.sizeKey)
          if (el) out[b.sizeKey] = el.value
        }
        if (b.boldKey) {
          const el = document.getElementById('f_' + b.boldKey)
          if (el) out[b.boldKey] = el.checked
        }
        if (b.bold2Key) {
          const el = document.getElementById('f_' + b.bold2Key)
          if (el) out[b.bold2Key] = el.checked
        }
      }
      for (const f of TEXT_FIELDS) {
        const el = document.getElementById('f_' + f.key)
        if (el) out[f.key] = el.value
      }
      for (const f of BOOL_FIELDS) {
        const el = document.getElementById('f_' + f.key)
        if (el) out[f.key] = el.checked
      }
      out.charsPerLine = out.printFont === 'small' ? 42 : 32
      return out
    }

    function readCurrent() {
      if (mode === 'code') {
        try {
          const parsed = JSON.parse(document.getElementById('codeEditor').value)
          codeErr = ''
          return { ...template, ...parsed }
        } catch (e) {
          codeErr = e.message || 'Некорректный JSON'
          return null
        }
      }
      return readForm()
    }

    function syncCodeFromTemplate(tpl) {
      document.getElementById('codeEditor').value = JSON.stringify(tpl, null, 2)
      codeErr = ''
    }

    function updatePreview() {
      const tpl = mode === 'code' ? (readCurrent() || template) : readForm()
      if (mode === 'code' && codeErr) setStatus('JSON: ' + codeErr, false)
      const iframe = document.getElementById('preview')
      const w = tpl.printFont === 'small' ? 42 : 32
      const basePx = tpl.printFont === 'small' ? 10.5 : 12.5
      iframe.style.width = Math.round(w * (basePx * 0.62) + 24) + 'px'
      iframe.style.height = '760px'
      iframe.srcdoc = buildPreviewHtml(tpl)
    }

    function setMode(next) {
      mode = next
      document.getElementById('tabForm').classList.toggle('active', next === 'form')
      document.getElementById('tabCode').classList.toggle('active', next === 'code')
      document.getElementById('formPanel').classList.toggle('hidden', next === 'code')
      document.getElementById('codePanel').classList.toggle('active', next === 'code')
      if (next === 'code') syncCodeFromTemplate(readForm())
      else if (!codeErr) {
        const tpl = readCurrent()
        if (tpl) fillForm(tpl)
      }
      updatePreview()
    }

    function buildForm() {
      const panel = document.getElementById('formPanel')
      panel.innerHTML = ''

      // Базовый шрифт
      const printSec = document.createElement('div')
      printSec.className = 'section'
      printSec.innerHTML = `<h2>${SECTION_TITLES.print}</h2>
        <p class="hint">Мелкий = Font B (42 символа). Обычный = Font A (32). Превью = бумага.</p>
        <label for="f_printFont">Базовый размер тела чека</label>
        <select id="f_printFont">
          <option value="small">Мелкий (рекомендуется)</option>
          <option value="normal">Обычный</option>
        </select>
        <label for="f_lineSpacing">Высота строки (16–48)</label>
        <input type="number" id="f_lineSpacing" min="16" max="48">`
      panel.appendChild(printSec)

      // Стили
      const styleSec = document.createElement('div')
      styleSec.className = 'section'
      styleSec.innerHTML = `<h2>${SECTION_TITLES.style}</h2>
        <p class="hint">Размер: мелкий / обычный / высокий. Галочка = жирный.</p>`
      for (const b of STYLE_BLOCKS) {
        const row = document.createElement('div')
        if (b.boldOnly) {
          row.className = 'style-row'
          row.style.gridTemplateColumns = '1fr auto'
          row.innerHTML = `<div class="chk"><input type="checkbox" id="f_${b.boldKey}"> <span>${esc(b.label)}</span></div>`
        } else {
          row.className = 'style-row'
          row.innerHTML = `
            <div>
              <label>${esc(b.label)}</label>
              <select id="f_${b.sizeKey}">${SIZE_OPTS.map(o => `<option value="${o[0]}">${o[1]}</option>`).join('')}</select>
            </div>
            <div class="chk"><input type="checkbox" id="f_${b.boldKey}"> жирный</div>
            ${b.bold2Key ? `<div class="chk"><input type="checkbox" id="f_${b.bold2Key}"> ${esc(b.bold2Label)}</div>` : '<div></div>'}
          `
        }
        styleSec.appendChild(row)
      }
      panel.appendChild(styleSec)

      const sections = { header: [], labels: [], footer: [] }
      for (const f of TEXT_FIELDS) sections[f.section].push(f)
      for (const sec of ['header', 'labels', 'footer', 'show']) {
        const div = document.createElement('div')
        div.className = 'section'
        div.innerHTML = `<h2>${SECTION_TITLES[sec]}</h2>`
        if (sec === 'show') {
          const grid = document.createElement('div')
          grid.className = 'checkbox-grid'
          for (const f of BOOL_FIELDS) {
            const lbl = document.createElement('label')
            lbl.innerHTML = `<input type="checkbox" id="f_${f.key}" checked> ${esc(f.label)}`
            grid.appendChild(lbl)
          }
          div.appendChild(grid)
        } else {
          for (const f of sections[sec]) {
            const wrap = document.createElement('div')
            wrap.innerHTML = `<label for="f_${f.key}">${esc(f.label)}</label>
              <input type="text" id="f_${f.key}">`
            div.appendChild(wrap)
          }
        }
        panel.appendChild(div)
      }

      panel.querySelectorAll('input, select').forEach(el => {
        el.addEventListener('input', updatePreview)
        el.addEventListener('change', () => {
          if (el.id === 'f_printFont') {
            const body = document.getElementById('f_sizeBody')
            const items = document.getElementById('f_sizeItems')
            if (body) body.value = el.value
            if (items) items.value = el.value
          }
          updatePreview()
        })
      })
    }

    function fillForm(tpl) {
      template = { ...tpl }
      const set = (id, val, isCheck) => {
        const el = document.getElementById(id)
        if (!el) return
        if (isCheck) el.checked = !!val
        else el.value = val != null ? val : ''
      }
      set('f_printFont', tpl.printFont)
      set('f_lineSpacing', tpl.lineSpacing)
      for (const b of STYLE_BLOCKS) {
        if (b.sizeKey) set('f_' + b.sizeKey, tpl[b.sizeKey])
        if (b.boldKey) set('f_' + b.boldKey, tpl[b.boldKey], true)
        if (b.bold2Key) set('f_' + b.bold2Key, tpl[b.bold2Key], true)
      }
      for (const f of TEXT_FIELDS) set('f_' + f.key, tpl[f.key])
      for (const f of BOOL_FIELDS) set('f_' + f.key, tpl[f.key] !== false, true)
      if (mode === 'code') syncCodeFromTemplate(template)
      updatePreview()
    }

    function setStatus(msg, ok) {
      const el = document.getElementById('status')
      el.textContent = msg || ''
      el.className = 'status' + (msg ? (ok ? ' ok' : ' err') : '')
    }

    async function init() {
      buildForm()
      try {
        const data = await api.getReceiptTemplate()
        defaults = data.defaults || {}
        fillForm(data.template || data)
      } catch (err) {
        setStatus('Ошибка загрузки: ' + (err.message || err), false)
      }
    }

    document.getElementById('tabForm').addEventListener('click', () => setMode('form'))
    document.getElementById('tabCode').addEventListener('click', () => setMode('code'))
    document.getElementById('codeEditor').addEventListener('input', () => {
      const tpl = readCurrent()
      if (tpl) { template = tpl; setStatus('', true); updatePreview() }
      else setStatus('JSON: ' + codeErr, false)
    })

    document.getElementById('btnSave').addEventListener('click', async () => {
      try {
        const tpl = readCurrent()
        if (!tpl) { setStatus('Исправьте JSON перед сохранением', false); return }
        await api.saveReceiptTemplate(tpl)
        template = tpl
        if (mode === 'form') fillForm(tpl)
        else syncCodeFromTemplate(tpl)
        setStatus('Сохранено — печать будет как в превью', true)
      } catch (err) {
        setStatus('Ошибка сохранения: ' + (err.message || err), false)
      }
    })

    document.getElementById('btnTest').addEventListener('click', async () => {
      try {
        const tpl = readCurrent()
        if (!tpl) { setStatus('Исправьте JSON перед печатью', false); return }
        setStatus('Печать…', true)
        await api.printReceipt({ sale: DEMO, ...tpl, posLabel: 'Касса 1' })
        setStatus('Тестовый чек отправлен — сравните с превью', true)
      } catch (err) {
        setStatus('Ошибка печати: ' + (err.message || err), false)
      }
    })

    document.getElementById('btnReset').addEventListener('click', () => {
      if (defaults && Object.keys(defaults).length) fillForm(defaults)
      setStatus('Сброшено к умолчанию', true)
    })

    document.getElementById('btnClose').addEventListener('click', () => api.closeReceiptEditor())

    init()
  </script>
</body>
</html>
