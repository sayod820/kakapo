# KAKAPO API — Node.js backend for Render
# Blueprint: New → Blueprint → выбрать репозиторий sayod820/kakapo-api

services:
  - type: web
    name: kakapo-api
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    disk:
      name: kakapo-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: DATA_DIR
        value: /data
      - key: NODE_ENV
        value: production
      - key: CORS_ORIGINS
        sync: false
