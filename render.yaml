# Render Blueprint — KAKAPO API (единый источник данных)
# Dashboard: New → Blueprint → репозиторий sayod820/kakapo, branch main

services:
  - type: web
    name: kakapo-api
    runtime: node
    rootDir: server/kakapo-api
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    plan: free
    disk:
      name: kakapo-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATA_DIR
        value: /data
      - key: CORS_ORIGINS
        value: "*"
