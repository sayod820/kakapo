# КАКАПО на одном сервере Hetzner: API + Next.js + nginx
# Запуск из корня репозитория:
#   docker compose -f deploy/hetzner/docker-compose.yml --env-file deploy/hetzner/.env up -d --build

services:
  api:
    build:
      context: ../../server/kakapo-api
      dockerfile: Dockerfile
    container_name: kakapo-api
    restart: unless-stopped
    environment:
      PORT: "8000"
      NODE_ENV: production
      DATA_DIR: /data
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
    volumes:
      - kakapo-data:/data
    networks:
      - kakapo-net
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  web:
    build:
      context: ../..
      dockerfile: deploy/hetzner/Dockerfile.web
      args:
        NEXT_PUBLIC_USE_API: "true"
        KAKAPO_BACKEND_URL: http://api:8000
        NEXT_PUBLIC_API_URL: ${PUBLIC_URL:-}
        NEXT_PUBLIC_WS_URL: ${WS_URL:-}
    container_name: kakapo-web
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      KAKAPO_BACKEND_URL: http://api:8000
      NEXT_PUBLIC_USE_API: "true"
    networks:
      - kakapo-net
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/store').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

  nginx:
    image: nginx:1.27-alpine
    container_name: kakapo-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot-www:/var/www/certbot:ro
      - certbot-certs:/etc/letsencrypt:ro
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_healthy
    networks:
      - kakapo-net

  certbot:
    image: certbot/certbot:latest
    container_name: kakapo-certbot
    volumes:
      - certbot-www:/var/www/certbot
      - certbot-certs:/etc/letsencrypt
    entrypoint: /bin/sh -c
    command: "trap exit TERM; while :; do sleep 12h & wait $${!}; certbot renew --webroot -w /var/www/certbot --quiet; done"
    networks:
      - kakapo-net

volumes:
  kakapo-data:
    name: kakapo-data
  certbot-www:
  certbot-certs:

networks:
  kakapo-net:
    name: kakapo-net
